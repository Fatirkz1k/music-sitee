<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AJI NTSSAM7O</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#020617,#071026,#0f172a);
    position:relative;
}

/* animated background */

.bg{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    animation:float 10s infinite alternate;
}

.c1{
    width:300px;
    height:300px;
    background:#00e1ff55;
    top:-50px;
    left:-50px;
}

.c2{
    width:250px;
    height:250px;
    background:#ff00aa44;
    bottom:-70px;
    right:-50px;
    animation-duration:12s;
}

.c3{
    width:180px;
    height:180px;
    background:#7d2cff44;
    top:40%;
    left:60%;
    animation-duration:14s;
}

@keyframes float{
    from{
        transform:translateY(-20px) translateX(-20px);
    }
    to{
        transform:translateY(20px) translateX(20px);
    }
}

/* glass card */

.card{
    width:380px;
    padding:35px;
    border-radius:30px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 0 30px rgba(0,225,255,0.2),
        0 0 60px rgba(255,0,170,0.1);
    text-align:center;
    position:relative;
    z-index:2;
}

/* title */

h1{
    color:white;
    font-size:35px;
    margin-bottom:25px;
    text-shadow:0 0 20px #00e1ff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #00e1ff;
    }
    to{
        text-shadow:0 0 30px #ff00aa;
    }
}

/* image */

.cover{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid rgba(255,255,255,0.2);
    box-shadow:0 0 25px #00e1ff;
    animation:rotate 12s linear infinite;
    margin-bottom:25px;
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

/* lyrics */

.lyrics{
    min-height:80px;
    color:#fff;
    font-size:26px;
    font-weight:500;
    margin-bottom:25px;
    text-shadow:0 0 15px cyan;
    transition:0.4s;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

/* progress bar */

.bar{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00e1ff,#ff00aa);
    box-shadow:0 0 20px cyan;
}

/* audio */

audio{
    width:100%;
    border-radius:20px;
}

/* particles */

.particle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.5;
    animation:particles 10s linear infinite;
}

@keyframes particles{
    from{
        transform:translateY(100vh) scale(0);
    }
    to{
        transform:translateY(-100vh) scale(1.5);
    }
}

</style>
</head>

<body>

<div class="bg">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
</div>

<div class="card">

    <h1>🎵 AJI NTSSAM7O 🎵</h1>

    <!-- بدل هاد الصورة بالصورة ديالك -->
    <img src="https://i.pinimg.com/736x/f3/14/4c/f3144c4abdbda1c55a2a757130c1a947.jpg" class="cover">

    <div class="lyrics" id="lyrics">
        🎶 ...
    </div>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <audio id="song" controls>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

</div>

<script>

// floating particles

for(let i=0;i<40;i++){

    let p = document.createElement("div");

    p.classList.add("particle");

    p.style.left = Math.random()*100 + "vw";

    p.style.animationDuration = (5 + Math.random()*10)+"s";

    p.style.opacity = Math.random();

    document.body.appendChild(p);
}

// lyrics

let lyrics = [
  { time: 0, text: "🎶 ooh oooh" },
  { time: 2, text: "❤️ chofi masra بيا" },
  { time: 4, text: "✨ ooooh oooooooooooooh" },
  { time: 6, text:"💥 boom boom bom boom" },
  { time: 9, text: "😵 mnk majani nom aji 3ndi ntsamho" },
  { time: 12, text: "👀 wya khlt l3yun" }
];

lyrics.sort((a,b)=>a.time-b.time);

const song = document.getElementById("song");
const lyricsBox = document.getElementById("lyrics");
const fill = document.getElementById("fill");

song.addEventListener("timeupdate", ()=>{

    let current = Math.floor(song.currentTime);

    for(let i=0;i<lyrics.length;i++){

        if(
            current >= lyrics[i].time &&
            (i === lyrics.length-1 || current < lyrics[i+1].time)
        ){
            lyricsBox.innerHTML = lyrics[i].text;
        }
    }

    let percent = (song.currentTime / song.duration) * 100;

    fill.style.width = percent + "%";

});

</script>

</body>
</html>
